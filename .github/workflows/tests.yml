name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      category:
        description: Category to run (e.g. Smoke). Leave blank to run all.
        required: false
        default: ''
      test_name:
        description: Specific Test Name to run (e.g. Admin_CanLogin_Successfully)
        required: false
        default: ''

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      statuses: write
      checks: write

    env:
      # Instructs TestSettings.cs to load appsettings.CI.json
      DOTNET_ENVIRONMENT: CI

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Dependencies
        run: dotnet restore OrangeHRM.Playwright.slnx

      - name: Build Solution
        run: dotnet build OrangeHRM.Playwright.slnx --no-restore

      # ── Playwright Browser Installation ─────────────────────────────────────
      # This step is required in CI to download the browser binaries.
      # It executes the PowerShell script generated by the Playwright build task.
      - name: Install Playwright Browsers
        shell: pwsh
        run: |
          $playwrightScript = "OrangeHRM.Playwright.Tests/bin/Debug/net8.0/playwright.ps1"
          if (Test-Path $playwrightScript) {
            & $playwrightScript install --with-deps
          } else {
            Write-Error "Playwright script not found at $playwrightScript"
            exit 1
          }

      # ── Execute Tests ───────────────────────────────────────────────────────
      - name: Run Tests
        id: run_tests
        continue-on-error: true
        shell: pwsh
        run: |
          $filter = ""
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ inputs.test_name }}" -ne "") {
              $filter = "--filter FullyQualifiedName~${{ inputs.test_name }}"
            } elseif ("${{ inputs.category }}" -ne "") {
              $filter = "--filter Category=${{ inputs.category }}"
            }
          }

          # Run the UI tests project
          dotnet test OrangeHRM.Playwright.Tests/OrangeHRM.Playwright.Tests.csproj `
            --no-build `
            --logger "trx;LogFileName=test-results.trx" `
            --results-directory TestResults $filter

      # ── Upload Artifacts (Traces & TRX) ────────────────────────────────────
      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            TestResults/**/*.zip
            TestResults/**/*.trx
          if-no-files-found: ignore
          retention-days: 7

      # ── Publish Test Results to GitHub UI ───────────────────────────────────
      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Test Results
          path: "TestResults/**/*.trx"
          reporter: dotnet-trx
          fail-on-error: false

      # ── Fail the job if tests failed ────────────────────────────────────────
      - name: Check Test Results
        if: steps.run_tests.outcome == 'failure'
        run: |
          echo "::error::Tests failed. Check the uploaded Playwright traces for details."
          exit 1
